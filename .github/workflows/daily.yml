# Daily intelligence run — 00:30 UTC = 06:00 IST.
# Requires repo secrets: GCP_PROJECT_ID, GCP_REGION, SUPABASE_DB_URL.
# GCP auth is keyless via Workload Identity Federation (no GCP_SA_KEY):
# pool `github` / provider `github-provider`, trusted only for this repo.
name: daily-intelligence

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/498496822134/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-actions@startup-extractor.iam.gserviceaccount.com

      - name: Run daily pipeline
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python -m cli.main scrape --days 1
          python -m cli.main fetch-text --limit 100
          # --since guard: never spill into the deferred pre-April archive
          python -m cli.main analyze --limit 50 --since "$(date -d '90 days ago' +%Y-%m-%d)"
          python -m cli.main embed --limit 100
          python -m cli.main build-graph
          # job search (both no-op when job_mode is off): rank companies, then
          # refresh openings for the top-scored ones (--deep is cheap after the
          # first pass thanks to careers-URL caching + 14-day negative cache)
          python -m cli.main score-targets
          python -m cli.main find-roles --limit 15 --deep
